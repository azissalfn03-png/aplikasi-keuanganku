<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keuangan Pribadi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #10b981; /* Ubah warna hijau agar identik dengan keuangan */
            --danger: #ef4444;
            --text: #f8fafc;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #cbd5e1; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: var(--primary);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #059669; transform: translateY(-2px); }
        #status { text-align: center; margin-top: 15px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Catat Transaksi</h2>
    <form id="financeForm">
        <div class="form-group">
            <label>Keterangan Transaksi</label>
            <input type="text" id="keterangan" placeholder="Cth: Gaji Bot / Beli Server" required>
        </div>
        
        <div class="form-group">
            <label>Jenis Arus Kas</label>
            <select id="jenis">
                <option value="masuk">Uang Masuk (+)</option>
                <option value="keluar">Uang Keluar (-)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Nominal (Rp)</label>
            <input type="number" id="nominal" placeholder="50000" required>
        </div>
        
        <button type="submit" id="submitBtn">Simpan Transaksi</button>
    </form>
    <p id="status"></p>
</div>

<script>
    // MASUKKAN URL WEB APP BARU KAMU DI SINI (Pastikan pakai URL dari "New Version")
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwTWOe8ZSCsS_zyalM8h9mHNIED17O83G3sR1xAWRyAzlVo1YmELOsr4_SzJ-F4nG0nwA/exec'; 
    const form = document.getElementById('financeForm');
    const statusText = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // Ubah tampilan tombol saat loading
        submitBtn.innerHTML = "Menyinkronkan...";
        submitBtn.style.background = "#64748b";
        statusText.innerHTML = "";
        statusText.style.color = "white";
        
        const data = {
            keterangan: document.getElementById('keterangan').value,
            jenis: document.getElementById('jenis').value,
            nominal: document.getElementById('nominal').value
        };

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify(data)
        })
        .then(response => {
            submitBtn.innerHTML = "Simpan Transaksi";
            submitBtn.style.background = "var(--primary)";
            statusText.innerHTML = "✅ Data berhasil masuk ke Google Sheets!";
            statusText.style.color = "#10b981";
            form.reset(); // Mengosongkan form otomatis
        })
        .catch(error => {
            submitBtn.innerHTML = "Simpan Transaksi";
            submitBtn.style.background = "var(--primary)";
            statusText.innerHTML = "❌ Gagal: " + error.message;
            statusText.style.color = "#ef4444";
        });
    });
</script>

</body>
</html>
