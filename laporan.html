<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan & Analisis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-900 text-slate-100 font-poppins flex h-screen">

    <aside class="w-64 bg-slate-800 p-6 flex flex-col space-y-4">
        <h1 class="text-2xl font-bold text-emerald-400 mb-6">FinDash.</h1>
        <a href="index.html" class="p-3 hover:bg-slate-700 rounded transition">📊 Dashboard</a>
        <a href="transaksi.html" class="p-3 hover:bg-slate-700 rounded transition">💸 Catat Transaksi</a>
        <a href="rab.html" class="p-3 hover:bg-slate-700 rounded transition">📋 Rencana Anggaran</a>
        <a href="laporan.html" class="p-3 bg-emerald-500 rounded text-white font-semibold">📈 Analisis & Laporan</a>
        <a href="riwayat.html" class="p-3 hover:bg-slate-700 rounded transition">🕰️ Riwayat Transaksi</a>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-semibold">Analisis Aktual vs RAB</h2>
            <button id="exportCsv" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition">
                📥 Ekspor CSV
            </button>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl mb-8 flex gap-4 items-end">
            <div>
                <label class="block text-xs text-slate-400 mb-1">Dari Tanggal</label>
                <input type="date" id="filterStart" class="bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:outline-none">
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1">Sampai Tanggal</label>
                <input type="date" id="filterEnd" class="bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:outline-none">
            </div>
            <button onclick="renderAnalysis()" class="bg-emerald-500 px-6 py-2 rounded text-sm font-semibold">Filter</button>
        </div>

        <div class="bg-slate-800 rounded-xl shadow-lg overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-700/50">
                    <tr>
                        <th class="p-4 text-slate-300">Kategori</th>
                        <th class="p-4 text-slate-300">Target RAB</th>
                        <th class="p-4 text-slate-300">Realisasi (Aktual)</th>
                        <th class="p-4 text-slate-300">Selisih / Sisa</th>
                        <th class="p-4 text-slate-300">Status</th>
                    </tr>
                </thead>
                <tbody id="analysisTableBody">
                    </tbody>
            </table>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script src="js/laporan.js"></script>
</body>
</html>
