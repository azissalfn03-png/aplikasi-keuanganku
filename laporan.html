<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan & Analisis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-900 text-slate-100 font-poppins flex h-screen overflow-hidden">

    <aside class="w-20 lg:w-64 bg-slate-800 flex flex-col flex-shrink-0 transition-all duration-300 ease-in-out border-r border-slate-700 z-40">
        <div class="p-4 lg:p-6 flex justify-center lg:justify-start items-center mb-4 border-b border-slate-700/50">
            <h1 class="text-2xl font-bold text-emerald-400 hidden lg:block">FinDash.</h1>
            <h1 class="text-2xl font-bold text-emerald-400 lg:hidden">F.</h1>
        </div>
        <nav class="flex flex-col space-y-3 px-2 lg:px-4">
            <a href="index.html" class="p-3 hover:bg-slate-700 rounded-xl transition flex items-center justify-center lg:justify-start gap-4 group">
                <span class="text-xl group-hover:scale-110 transition-transform">📊</span>
                <span class="hidden lg:block font-medium">Dashboard</span>
            </a>
            <a href="transaksi.html" class="p-3 hover:bg-slate-700 rounded-xl transition flex items-center justify-center lg:justify-start gap-4 group">
                <span class="text-xl group-hover:scale-110 transition-transform">💸</span>
                <span class="hidden lg:block font-medium">Catat Transaksi</span>
            </a>
            <a href="rab.html" class="p-3 hover:bg-slate-700 rounded-xl transition flex items-center justify-center lg:justify-start gap-4 group">
                <span class="text-xl group-hover:scale-110 transition-transform">📋</span>
                <span class="hidden lg:block font-medium">Rencana Anggaran</span>
            </a>
            <!-- AKTIF DI HALAMAN INI -->
            <a href="laporan.html" class="p-3 bg-emerald-500 text-white shadow-lg shadow-emerald-500/20 rounded-xl transition flex items-center justify-center lg:justify-start gap-4 group">
                <span class="text-xl">📈</span>
                <span class="hidden lg:block font-medium">Analisis & Laporan</span>
            </a>
            <a href="riwayat.html" class="p-3 hover:bg-slate-700 rounded-xl transition flex items-center justify-center lg:justify-start gap-4 group">
                <span class="text-xl group-hover:scale-110 transition-transform">🕰️</span>
                <span class="hidden lg:block font-medium">Riwayat Transaksi</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-slate-900 overflow-hidden relative">
        <div class="flex-1 p-4 md:p-8 overflow-y-auto overflow-x-hidden">
            <div class="max-w-6xl mx-auto w-full">
                
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <h2 class="text-2xl md:text-3xl font-semibold">Analisis Aktual vs RAB</h2>
                    <button id="exportCsv" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition shadow">
                        📥 Ekspor CSV
                    </button>
                </div>

                <div class="bg-slate-800 p-4 md:p-6 rounded-xl mb-8 flex flex-col md:flex-row gap-4 items-end shadow-lg w-full">
                    <div class="w-full md:w-auto">
                        <label class="block text-xs text-slate-400 mb-1">Dari Tanggal</label>
                        <input type="date" id="filterStart" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:outline-none focus:border-emerald-500">
                    </div>
                    <div class="w-full md:w-auto">
                        <label class="block text-xs text-slate-400 mb-1">Sampai Tanggal</label>
                        <input type="date" id="filterEnd" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:outline-none focus:border-emerald-500">
                    </div>
                    <button onclick="renderAnalysis()" class="w-full md:w-auto bg-emerald-500 hover:bg-emerald-600 px-6 py-2 rounded text-sm font-semibold transition">Filter</button>
                </div>

                <div class="bg-slate-800 rounded-xl shadow-lg w-full overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[600px]">
                            <thead class="bg-slate-700/50">
                                <tr>
                                    <th class="p-4 text-slate-300">Kategori</th>
                                    <th class="p-4 text-slate-300 text-right">Target RAB</th>
                                    <th class="p-4 text-slate-300 text-right">Realisasi (Aktual)</th>
                                    <th class="p-4 text-slate-300 text-right">Selisih / Sisa</th>
                                    <th class="p-4 text-slate-300 text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody id="analysisTableBody"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script src="js/laporan.js"></script>
</body>
</html>
